name: Nix

on:
  pull_request:
  push:
    branches: [master]

jobs:
  # Single matrix that runs every check derivation in parallel — same set the
  # local lefthook pre-commit hook runs.
  flake-check:
    name: ${{ matrix.check }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check:
          - byte-compile
          - tests
          - lint
          - format
          - coverage
          - benchmark
          - shellcheck
          - nix-format
          - build
          - docs
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: ${{ matrix.check }}
        run: |
          nix build --no-link --print-build-logs \
            ".#checks.x86_64-linux.${{ matrix.check }}"

      - name: Upload coverage report
        if: matrix.check == 'coverage'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore

      - name: Upload benchmark numbers
        if: matrix.check == 'benchmark'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-current
          path: bench/current.txt
          if-no-files-found: ignore

      - name: Upload built docs
        if: matrix.check == 'docs'
        run: |
          nix build --print-build-logs ".#docs"
          mkdir -p _docs
          cp -r result/share/doc/ledger-mode/* _docs/ || true
          cp result/share/info/ledger-mode.info _docs/ || true
      - name: Publish docs artifact
        if: matrix.check == 'docs'
        uses: actions/upload-artifact@v4
        with:
          name: ledger-mode-docs
          path: _docs/

  # Run the lefthook pre-commit checks themselves to make sure they stay
  # in sync with the flake.
  lefthook:
    name: lefthook (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
      - run: nix develop --command lefthook run pre-commit --all-files
